spring.application.name=Flyora_Backend

# FlyoraDB connection settings
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Dùng tên class làm tên bảng (không chuyển sang snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# OpenAPI config
openapi.title=Flyora Web API
openapi.description=This is the API documentation for the Flyora backend system.
openapi.version=1.0.0
openapi.server=http://localhost:8080

# Logging SQL chi tiết (DEBUG + BINDING PARAMS)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT
app.jwt.secret=${JWT_SECRET}

# GHN
ghn.token=${GHN_TOKEN}
ghn.shop_id=${GHN_SHOP_ID}
ghn.shop.district_id=${GHN_DISTRICT_ID}
ghn.shop.ward_code=${GHN_WARD_CODE}

# PayOS
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

# Gemini AI API Configuration
gemini.api.key=${GEMINI_API_KEY}

# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true